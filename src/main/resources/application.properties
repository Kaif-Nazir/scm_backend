spring.application.name=smart-contact-manager-backend

# Load local .env when present (for direct local runs)
spring.config.import=optional:file:.env[.properties]

# ===============================
# DATABASE
# ===============================
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/scm}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# ===============================
# JPA / HIBERNATE
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# ===============================
# SERVER
# ====

app.cors.allowed-origin-patterns=${CORS_ALLOWED_ORIGIN_PATTERNS:http://localhost:5173,https://scmfrontendmkn.vercel.app,https://*.vercel.app}


# MAIL (Resend API)
app.mail.resend.api-key=${RESEND_API_KEY:}
app.mail.from-email=${MAIL_FROM_EMAIL:onboarding@resend.dev}


# JWT

jwt.secret=${JWT_SECRET:bG9jYWxfZGV2X2RlbW9fc2VjcmV0X2tleV8xMjM0NTY3ODkwMTIzNDU2Nzg5MDEyMw==}
jwt.expiration=${JWT_EXPIRATION:86400000}

# ===============================
# GOOGLE OAuth2
# ===============================

spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:local-dev-google-client-id}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:local-dev-google-client-secret}
spring.security.oauth2.client.registration.google.scope=email,profile
app.oauth2.redirect-uri=${OAUTH2_REDIRECT_URI:http://localhost:5173/oauth2/callback}
